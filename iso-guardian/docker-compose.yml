version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: iso_guardian_backend
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_URL=sqlite:////app/data/reports/iso_analysis.db
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
    container_name: iso_guardian_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: iso_guardian_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: iso_guardian_grafana
    ports:
      - "3001:3000"
    restart: unless-stopped
    depends_on:
      - prometheus
